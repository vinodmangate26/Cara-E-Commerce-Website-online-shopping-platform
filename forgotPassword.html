<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Forgot Password | Cara</title>

    <link rel="icon" href="images/favicon.jpg" />

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="toast.css" />
    <link rel="stylesheet" href="forgotPassword.css" />
  </head>

  <body>
    <!-- HEADER -->
    <section id="header">
      <a href="index.html">
        <img src="images/logo.png" alt="Cara Logo" />
      </a>

      <ul id="navbar">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="login.html" id="login-btn">Login</a></li>
      </ul>
    </section>

    <!-- FORGOT SECTION -->
    <section id="forgot-section">
      <div class="auth-card">
        <a href="index.html" class="back-button">&#8592; Back to Shop</a>

        <h2>Forgot Password</h2>

        <p class="subtitle">Enter your email to reset your password 🔒</p>

        <form id="forgotForm" novalidate>
          <!-- EMAIL -->
          <div class="form-group">
            <label for="forgotEmail">Email Address</label>
            <input
              type="email"
              id="forgotEmail"
              name="email"
              placeholder="Enter registered email address"
              autocomplete="email"
              required
            />
          </div>

          <!-- NEW PASSWORD -->
          <div class="form-group">
            <label for="forgotNewPass">New Password</label>
            <div
              class="password-wrapper"
              style="position: relative; display: flex; align-items: center"
            >
              <input
                type="password"
                placeholder="Enter your new password"
                id="forgotNewPass"
                name="newPassword"
                autocomplete="new-password"
                required
                style="width: 100%; padding-right: 40px"
              />
              <button
                type="button"
                id="toggleNewPass"
                class="ri-eye-line toggle-eye"
                aria-label="Toggle new password visibility"
                style="
                  position: absolute;
                  right: 10px;
                  background: none;
                  border: none;
                  cursor: pointer;
                  color: #666;
                  font-size: 18px;
                "
              ></button>
            </div>
          </div>

          <!-- CONFIRM PASSWORD -->
          <div class="form-group">
            <label for="forgotConfirmPass">Confirm Password</label>
            <div
              class="password-wrapper"
              style="position: relative; display: flex; align-items: center"
            >
              <input
                type="password"
                placeholder="Confirm your new password"
                id="forgotConfirmPass"
                name="confirmPassword"
                autocomplete="new-password"
                required
                style="width: 100%; padding-right: 40px"
              />
              <button
                type="button"
                id="toggleConfirmPass"
                class="ri-eye-line toggle-eye"
                aria-label="Toggle confirm password visibility"
                style="
                  position: absolute;
                  right: 10px;
                  background: none;
                  border: none;
                  cursor: pointer;
                  color: #666;
                  font-size: 18px;
                "
              ></button>
            </div>
          </div>

          <!-- BUTTON -->
          <button type="submit" class="btn-primary">RESET PASSWORD</button>
        </form>

        <!-- BACK TO LOGIN -->
        <div class="switch-auth">
          Remember your password?
          <a href="login.html">Login</a>
        </div>
      </div>
    </section>
  </body>

  <script src="app.js"></script>
  <script src="forgotPassword.js"></script>
</html>
