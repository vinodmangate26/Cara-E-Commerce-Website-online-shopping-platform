<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">
    
    <!-- Viewport for Responsive Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist — Cara</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />

    <style>
        body {
            font-family: 'League Spartan', sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .header-section {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, #088178 0%, #066e66 100%);
            color: white;
            position: relative;
        }

        .header-section h1 {
            font-size: 40px;
            margin: 0 0 10px 0;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header-section p {
            font-size: 16px;
            opacity: 0.9;
            margin: 0;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-secondary {
            text-decoration: none;
            padding: 12px 25px;
            background-color: transparent;
            border: 2px solid white;
            color: white;
            border-radius: 4px;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .btn-secondary:hover {
            background-color: white;
            color: #088178;
        }

        .btn-danger-outline {
            padding: 12px 25px;
            background-color: transparent;
            border: 2px solid #ef4444;
            color: #ef4444;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn-danger-outline:hover {
            background-color: #ef4444;
            color: white;
        }

        .wishlist-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .wishlist-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .wishlist-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .wishlist-card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .wishlist-card h3 {
            font-size: 18px;
            color: #1a202c;
            margin: 10px 0 5px 0;
            font-weight: 600;
        }

        .wishlist-card p {
            color: #088178;
            font-weight: 700;
            font-size: 20px;
            margin: 0 0 15px 0;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .add-to-cart-btn {
            flex: 2;
            padding: 10px;
            background-color: #088178;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .add-to-cart-btn:hover {
            background-color: #066e66;
        }

        .remove-icon-btn {
            flex: 1;
            padding: 10px;
            background-color: #fee2e2;
            color: #ef4444;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-icon-btn:hover {
            background-color: #ef4444;
            color: white;
        }

        .empty-state {
            text-align: center;
            max-width: 500px;
            margin: 80px auto;
            padding: 20px;
        }

        .empty-state i {
            font-size: 80px;
            color: #cbd5e1;
            margin-bottom: 20px;
            display: block;
        }

        .empty-state h2 {
            font-size: 24px;
            color: #334155;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #64748b;
            margin-bottom: 25px;
        }

        .empty-state a {
            text-decoration: none;
            display: inline-block;
            padding: 12px 30px;
            background-color: #088178;
            color: white;
            border-radius: 6px;
            font-weight: 600;
            transition: 0.3s;
        }

        .empty-state a:hover {
            background-color: #066e66;
        }

        /* Toast styles if app.js is present */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #fff;
            padding: 15px 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            border-radius: 8px;
            border-left: 5px solid #088178;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: 0.4s;
        }
        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body>

    <header class="header-section">
        <h1>My Wishlist <i class="ri-heart-fill" style="color: #f43f5e;"></i></h1>
        <p>Save your favorite items and secure them in your cart anytime</p>
        <div class="nav-buttons">
            <a href="shop.html" class="btn-secondary"><i class="ri-arrow-left-line"></i> Back to Shop</a>
            <button id="clearAllBtn" class="btn-danger-outline" onclick="clearWishlist()"><i class="ri-delete-bin-6-line"></i> Clear All</button>
        </div>
    </header>

    <main>
        <div class="wishlist-container" id="wishlistContainer" aria-live="polite"></div>
    </main>

    <!-- Global Toast Component -->
    <div id="toast">
        <i class="ri-checkbox-circle-line" style="color: #088178; font-size: 20px;"></i>
        <span id="toast-msg">Item added to cart!</span>
    </div>

    <script>
        const wishlistContainer = document.getElementById("wishlistContainer");
        const clearAllBtn = document.getElementById("clearAllBtn");

        let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

        function showLocalToast(msg) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            toastMsg.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function renderWishlist() {
            wishlistContainer.innerHTML = '';
            if (wishlist.length === 0) {
                clearAllBtn.style.display = 'none';
                wishlistContainer.style.display = 'block';
                wishlistContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="ri-heart-pulse-line"></i>
                        <h2>Your wishlist is empty</h2>
                        <p>Explore our premium collections and add products you love to your personal wishlist!</p>
                        <a href="shop.html">Start Shopping</a>
                    </div>
                `;
            } else {
                clearAllBtn.style.display = 'inline-block';
                wishlistContainer.style.display = 'grid';
                wishlist.forEach((product, index) => {
                    wishlistContainer.innerHTML += `
                        <div class="wishlist-card">
                            <img src="${product.image || 'images/products/f1.jpg'}" alt="${product.name}" loading="lazy">
                            <div>
                                <h3>${product.name}</h3>
                                <p>${product.price}</p>
                            </div>
                            <div class="card-actions">
                                <button class="add-to-cart-btn" onclick="moveToCart(${index})" aria-label="Add ${product.name} to cart">
                                    <i class="ri-shopping-cart-2-line"></i> Add to Cart
                                </button>
                                <button class="remove-icon-btn" onclick="removeItem(${index})" aria-label="Remove ${product.name} from wishlist">
                                    <i class="ri-delete-bin-line"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        function removeItem(index) {
            const removedItem = wishlist[index].name;
            wishlist.splice(index, 1);
            localStorage.setItem("wishlist", JSON.stringify(wishlist));
            renderWishlist();
            showLocalToast(`${removedItem} removed from wishlist`);
        }

        function clearWishlist() {
            if (confirm("Are you sure you want to clear your entire wishlist?")) {
                wishlist = [];
                localStorage.setItem("wishlist", JSON.stringify(wishlist));
                renderWishlist();
                showLocalToast("Wishlist cleared completely!");
            }
        }

        function moveToCart(index) {
            const product = wishlist[index];
            
            // Add to cart logic
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            const existingItem = cart.find(item => item.name === product.name);
            if (existingItem) {
                existingItem.quantity = (existingItem.quantity || 1) + 1;
            } else {
                cart.push({
                    name: product.name,
                    price: product.price,
                    image: product.image,
                    quantity: 1
                });
            }
            localStorage.setItem("cart", JSON.stringify(cart));
            
            // Remove from wishlist
            wishlist.splice(index, 1);
            localStorage.setItem("wishlist", JSON.stringify(wishlist));
            
            renderWishlist();
            showLocalToast(`${product.name} added to cart!`);
        }

        // Initial render
        renderWishlist();
    </script>

</body>
</html>
