        <section id="header">
            <!-- Logo -->

                <img id="siteLogo" src="images/logo.png" alt="Cara Logo" />
            </a>
            
            <div>
                <ul id="navbar">

                    <!-- Main Navigation Links -->
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="blog.html">Blog</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="try-on.html">Try-On</a></li>
                    <li><a href="community.html">Community</a></li>
                    <li><a href="promotions.html">Promotions</a></li>
                    
                    <!-- Contact Icon -->
                    <li class="nav-icon">
                        <a href="contact.html" aria-label="Contact">
                            <i class="ri-customer-service-2-line"></i>
                        </a>
                    </li>
                    
                    <!-- Login Icon -->
                    <li class="nav-icon">
                        <a href="login.html" aria-label="Login">
                            <i class="ri-user-3-line"></i>
                        </a>
                    </li>
                    
                    <!-- Cart Icon -->
                    <li class="nav-icon">
                        <a href="cart.html" id="lg-bag" aria-label="Cart">

                    <!-- Theme Toggle -->
                    <li class="nav-icon">
                        <button
                        class="theme-toggle"
                        id="themeToggle"

                    </button>

                <!-- Close Button -->
                <a

        </ul>
    </div>
    
    <!-- Mobile Navbar -->
    <div class="mobile">
        
        <!-- Login Icon -->
        <a href="login.html" aria-label="Login">
            <i class="ri-user-3-line"></i>
        </a>
        
        <!-- Cart Icon -->
        <a href="cart.html" aria-label="Cart">
            <i class="ri-shopping-bag-4-line"></i>
        </a>

        <i
        class="fas fa-outdent"
        id="bar"
        role="button"
        aria-label="Open menu"
        aria-expanded="false"
        tabindex="0"
        ></i>
        
    </div>
</section>

<div class="login-container">
    <a href="index.html" class="back-button">&#8592; Back to Shop</a>
    
    <div class="logo-container">
        <img src="images/logo.png" alt="Cara Logo" class="logo-img">
    </div>
    <h2>Welcome Back!</h2>
    <p class="subtitle">Please enter your details to sign in</p>
    
    <form id="loginForm" class="login-form" novalidate>
        <div class="input-group">
            <label for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" class="input-field" placeholder="example@domain.com" required>
        </div>
        
        <div class="input-group password-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" class="input-field" placeholder="••••••••" required>
            <button type="button" id="togglePassword" class="toggle_password">
                <i class="ri-eye-line"></i>
            </button>
        </div>
        
        <div class="remember-forgot">
            <div class="remember">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>
            <a href="forgotPassword.html" class="forgot">Forgot Password?</a>
        </div>
        
        <button type="submit" class="login-btn"><span>Sign In</span></button>
    </form>
    
    <div class="signup-link">
        Don't have an account? <a href="register.html">Register</a>
    </div>
</div>

<script src="app.js?v=1779120917216"></script>
<script src="login.js"></script>
</body>
</html>
