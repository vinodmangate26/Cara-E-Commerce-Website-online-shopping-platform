<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Cara</title>

    <link rel="icon" type="image/jpg" sizes="32x32" href="images/favicon.jpg">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="toast.css">
    <link rel="stylesheet" href="register.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
</head>

<body>

    <!-- HEADER -->
    <section id="header">

        <a href="index.html">
            <img src="images/logo.png" alt="Cara Logo">
        </a>

        <div>
            <ul id="navbar">

                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>

                <li>
                    <a href="login.html" class="active">
                        Login
                    </a>
                </li>

                <li>
                    <a href="cart.html" id="lg-bag">
                        <i class="ri-shopping-bag-4-line"></i>
                    </a>
                </li>

            </ul>
        </div>

    </section>

    <!-- REGISTER SECTION -->
    <section id="register-section">

        <div class="auth-card">

            <h2>Register</h2>

            <p class="subtitle">
                Create your account 😊
            </p>

            <form id="registerForm" novalidate>
                <!-- FULL NAME -->
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text"
                        id="registerUsername"
                        placeholder="Enter your full name" required>
                </div>

                <!-- EMAIL -->
                <div class="form-group">
                    <label>Email</label>
                    <input type="email"
                        id="registerEmail"
                        placeholder="Enter your email" required>
                </div>

                <!-- PASSWORD -->
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password"
                            placeholder="Enter your password"
                            id="registerPassword" required>
                        <i class="ri-eye-line toggle-eye"></i>
                    </div>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password"
                            placeholder="Confirm your password"
                            id="confirmPassword" required>
                        <i class="ri-eye-line toggle-eye"></i>
                    </div>
                </div>

                <!-- BUTTON -->
                <button type="submit" class="btn-primary">
                    CREATE ACCOUNT
                </button>
            </form>

            <!-- LOGIN LINK -->
            <div class="switch-auth">

                Already have an account?

                <a href="login.html">
                    Login
                </a>

            </div>

        </div>

    </section>

    <script src="app.js"></script>
    <script src="register.js"></script>
    <script>
    const toggleEyes = document.querySelectorAll(".toggle-eye");

    toggleEyes.forEach((eye) => {

        eye.addEventListener("click", () => {

            const passwordInput = eye.previousElementSibling;

            if (passwordInput.type === "password") {

                passwordInput.type = "text";

                eye.classList.remove("ri-eye-line");
                eye.classList.add("ri-eye-off-line");

            } else {

                passwordInput.type = "password";

                eye.classList.remove("ri-eye-off-line");
                eye.classList.add("ri-eye-line");
            }

        });

    });
</script>

    <script src="app.js"></script>
    <script src="register.js"></script>
</body>

</html>
