<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cara</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" href="toast.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-container">
        <a href="index.html" class="back-button">&#8592; Back to Shop</a>
        
        <div class="logo-container">
    <img src="images/logo.png" alt="Cara Logo" class="logo-img">
</div>
        <h2>Welcome Back!</h2>
        <p class="subtitle">Please enter your details to sign in</p>

        <form id="loginForm" class="login-form" novalidate>
            <div class="input-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" class="input-field" placeholder="example@domain.com" required>
            </div>

            <div class="input-group password-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" class="input-field" placeholder="••••••••" required>
                <button type="button" id="togglePassword" class="toggle_password">
                    <i class="ri-eye-line"></i>
                </button>
            </div>

            <div class="remember-forgot">
                <div class="remember">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>
                <a href="#" class="forgot">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn"><span>Sign In</span></button>
        </form>

        <div class="signup-link">
            Don't have an account? <a href="register.html">Register</a>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="login.js"></script>
</body>
</html>
